<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="知识问答活动管理系统 - 活动管理、题库管理、数据统计一体化平台">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>知识问答活动管理系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        window.__ASSET_VERSION__ = Date.now();
        window.__loadScript__ = function(src) {
            document.write('<script src="' + src + (src.includes('?') ? '&' : '?') + 'v=' + window.__ASSET_VERSION__ + '"><\/script>');
        };
        document.write('<link rel="stylesheet" href="css/admin.css?v=' + window.__ASSET_VERSION__ + '">');
    </script>
</head>
<body>
<!-- ===== TOP NAVIGATION BAR ===== -->
<header class="top-nav">
    <div class="top-nav-left">
        <div class="brand">
            <div class="brand-icon">阅</div>
            <div class="brand-text">
                <div class="brand-name">阅途·文遇</div>
                <div class="brand-url">www.yuetu100.com</div>
            </div>
        </div>
        <nav class="top-nav-menu" id="topNavMenu">
            <a class="top-nav-item" data-section="home" onclick="switchTopNav('home')">首页</a>
            <a class="top-nav-item" data-section="activity-list-top" onclick="switchTopNav('activity-list-top')">活动列表</a>
            <a class="top-nav-item active" data-section="activity" onclick="switchTopNav('activity')">活动管理</a>
            <a class="top-nav-item" data-section="resource" onclick="switchTopNav('resource')">资源管理</a>
            <a class="top-nav-item" data-section="operation" onclick="switchTopNav('operation')">运营管理</a>
            <a class="top-nav-item" data-section="data" onclick="switchTopNav('data')">数据管理</a>
            <a class="top-nav-item" data-section="system" onclick="switchTopNav('system')">系统管理</a>
        </nav>
    </div>
    <div class="top-nav-right">
        <button class="btn btn-outline btn-sm" style="border-color:#B8956A;color:#B8956A">访问PC官网</button>
        <div class="top-nav-dropdown">
            <span>阅途文化集团</span>
            <span style="margin-left:4px">▼</span>
        </div>
        <div class="top-nav-icon">🔍</div>
        <div class="top-nav-icon">📅</div>
        <div class="top-nav-icon">🔔</div>
        <div class="top-nav-divider"></div>
        <div class="top-nav-user">
            <div class="user-avatar">🐱</div>
            <span>林月机构号</span>
        </div>
    </div>
</header>

<div class="manage-topbar" id="manageTopbar"></div>
<div class="global-page-tabs" id="globalPageTabs"></div>

<div class="layout">
    <!-- ===== SIDEBAR (populated by JS — renderSidebar) ===== -->
    <aside class="sidebar" id="sidebar"></aside>
    <!-- ===== MAIN CONTENT ===== -->
    <main class="main" id="mainContent"></main>
</div>
<!-- ===== SHARED MODAL ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-head">
            <h3 id="modalTitle">标题</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-foot" id="modalFoot">
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" id="modalConfirm">确认</button>
        </div>
    </div>
</div>
<!-- ===== SCRIPTS ===== -->
<script>__loadScript__('js/app.js');</script>
<script>__loadScript__('js/workbench.js');</script>
<script>__loadScript__('js/dashboard.js');</script>
<script>__loadScript__('js/activity.js');</script>
<script>__loadScript__('js/quiz-activity-create.js');</script>
<script>__loadScript__('js/offline-activity-create.js');</script>
<script>__loadScript__('js/activity-manage.js');</script>
<script>__loadScript__('js/question-bank.js');</script>
<script>__loadScript__('js/paper-mgmt.js');</script>
<script>__loadScript__('js/paper-review.js');</script>
<script>__loadScript__('js/practice-mgmt.js');</script>
<script>__loadScript__('js/data-mgmt.js');</script>
<script>__loadScript__('js/submission-list.js');</script>
<script>__loadScript__('js/leaderboard.js');</script>
<script>__loadScript__('js/station-activity.js');</script>
</body>
</html>
